<!DOCTYPE html>

<title>Map Search — Saskatoon MLS — Krishna Ambilwade</title>
<meta name="description" content="Browse all active Saskatoon MLS listings on an interactive map. Click any pin to view details." />
<link rel="canonical" href="https://meetkrishna.com/map-search/" />

<style>
  :root {
    --cream:#FAF7F2;--ink:#1A1A1A;--ink-soft:#3A3A3A;--line:#E5E0D7;
    --forest:#1F3A2E;--forest-deep:#14271F;--sage:#C8D5C0;--sage-pale:#E4EAE0;--gold:#D9B978;
    --serif:'Fraunces',Georgia,serif;--sans:'Inter',-apple-system,sans-serif;
    --ease:cubic-bezier(0.22,1,0.36,1);--nav-h:62px;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:var(--sans);color:var(--ink);background:var(--ink);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}

  /* NAV */
  .nav{position:fixed;top:0;left:0;right:0;z-index:50;height:var(--nav-h);padding:0 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,247,242,0.96);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);box-shadow:0 1px 0 rgba(26,26,26,0.06);}
  .wordmark{display:flex;flex-direction:column;line-height:1;}
  .wordmark__name{font-family:var(--serif);font-weight:400;font-size:22px;letter-spacing:-0.01em;}
  .wordmark__tag{font-size:9px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;margin-top:4px;opacity:0.85;}
  .nav__links{display:flex;gap:34px;align-items:center;}
  .nav__links a{font-size:13px;padding:6px 0;transition:opacity 200ms var(--ease);position:relative;}
  .nav__links a:hover{opacity:0.65;}

  /* BUY DROPDOWN */
  .nav__dropdown{position:relative;padding-bottom:16px;}
  .nav__dropdown-toggle{font-size:13px;padding:6px 0;cursor:pointer;display:inline-flex;align-items:center;gap:4px;color:var(--forest);font-weight:500;position:relative;}
  .nav__dropdown-toggle::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:1px;background:var(--forest);}
  .nav__dropdown-toggle svg{transition:transform 250ms var(--ease);}
  .nav__dropdown:hover .nav__dropdown-toggle svg{transform:rotate(180deg);}
  .nav__dropdown-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:6px;min-width:170px;box-shadow:0 8px 32px rgba(26,26,26,0.10);opacity:0;pointer-events:none;transition:opacity 200ms var(--ease),transform 200ms var(--ease);}
  .nav__dropdown:hover .nav__dropdown-menu{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  .nav__dropdown-menu a{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12.5px;color:var(--ink-soft);border-radius:6px;transition:background 150ms,color 150ms;}
  .nav__dropdown-menu a:hover{background:var(--sage-pale);color:var(--forest);}
  .nav__dropdown-menu a.active{color:var(--forest);font-weight:500;}

  .nav__utils{display:flex;gap:12px;align-items:center;}
  .cta{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:var(--forest);color:var(--cream);border-radius:999px;font-size:12.5px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;transition:background 250ms var(--ease),transform 250ms var(--ease);border:none;cursor:pointer;}
  .cta:hover{background:var(--forest-deep);transform:translateY(-1px);}
  .cta .arrow{transition:transform 300ms var(--ease);}
  .cta:hover .arrow{transform:translateX(3px);}
  .nav__toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--ink);}

  /* MOBILE MENU */
  .mobile-menu{position:fixed;inset:0;background:var(--forest-deep);color:var(--cream);z-index:60;padding:100px 32px 40px;display:flex;flex-direction:column;gap:8px;opacity:0;pointer-events:none;transition:opacity 300ms var(--ease);}
  .mobile-menu.open{opacity:1;pointer-events:auto;}
  .mobile-menu a{font-family:var(--serif);font-weight:300;font-size:32px;padding:14px 0;border-bottom:1px solid rgba(250,247,242,0.12);}
  .mobile-menu__cta{display:inline-flex !important;align-items:center;gap:10px;margin-top:20px;padding:14px 28px;background:#C9A96E !important;color:#1A1A1A !important;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;width:fit-content !important;}
  .mobile-menu__close{position:absolute;top:22px;right:24px;background:none;border:none;color:var(--cream);cursor:pointer;padding:8px;}

  /* FULLSCREEN MAP FRAME */
  .map-frame{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;}
  .map-frame iframe{width:100%;height:100%;border:none;display:block;}

  @media(max-width:1024px){
    .nav{padding:0 24px;}
    .nav__links,.nav__utils .cta{display:none;}
    .nav__toggle{display:inline-flex;}
  }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <a href="/" class="wordmark">
    <span class="wordmark__name">Krishna Ambilwade</span>
    <span class="wordmark__tag">Saskatoon Real Estate</span>
  </a>
  <div class="nav__links">
    <div class="nav__dropdown">
      <span class="nav__dropdown-toggle">
        Buy
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <div class="nav__dropdown-menu">
        <a href="/buy/">Featured Listings</a>
        <a href="/map-search/" class="active">Map Search</a>
        <a href="/listings/">All Listings</a>
      </div>
    </div>
    <a href="/sell/">Sell</a>
    <a href="/rent/">Rent</a>
    <a href="/property-management/">Property Management</a>
    <a href="/#about">About</a>
    <a href="/journal/">Journal</a>
  </div>
  <div class="nav__utils">
    <a href="/listings/" style="font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85;transition:opacity 200ms;">List View</a>
    <a href="/cal/" target="_blank" rel="noopener" class="cta">
      Book a Call
      <svg class="arrow" width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5h11M8 1l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <button class="nav__toggle" aria-label="Open menu" id="navToggle">
      <svg width="22" height="14" viewBox="0 0 22 14" fill="none"><path d="M0 1h22M0 13h22" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu__close" id="mobileClose">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M2 2l18 18M20 2L2 20" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
  </button>
  <a href="/buy/">Buy</a>
  <a href="/buy/" class="sub">Featured Listings</a>
  <a href="/map-search/" class="sub">Map Search</a>
  <a href="/listings/" class="sub sub-end">All Listings</a>
  <a href="/sell/">Sell</a>
  <a href="/rent/">Rent</a>
  <a href="/property-management/">Property Management</a>
  <a href="/#about">About</a>
  <a href="/journal/">Journal</a>
  <a href="/cal/" target="_blank" rel="noopener" class="mobile-menu__cta">Book a Call</a>
</div>

<!-- Fullscreen map — fills viewport below nav -->
<div class="map-frame">
  <iframe
    src="https://idx.myrealpage.com/wps/-/tmpl~v2,idx_v2_map_pos~52.14376817546159%7C-106.65181899999999,idx_v2_map_radius~9/recip/67223/idx.search"
    title="Saskatoon MLS map search"
    allowfullscreen
    loading="lazy"
  ></iframe>
</div>

<script>
  const navToggle = document.getElementById('navToggle');
  const mClose    = document.getElementById('mobileClose');
  const mMenu     = document.getElementById('mobileMenu');
  navToggle?.addEventListener('click', () => mMenu.classList.add('open'));
  mClose?.addEventListener('click',    () => mMenu.classList.remove('open'));
  mMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mMenu.classList.remove('open')));
</script>
</body>
</html>
